<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Controle de clientes e cobranças para freelancers e pequenas agências."
    />
    <title>Controle de clientes e cobranças</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      try {
        document.documentElement.classList.toggle(
          "dark",
          window.localStorage.getItem("billingflow:theme") === "dark"
        );
      } catch {
        document.documentElement.classList.remove("dark");
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
